<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnRAG - AI Quiz Generator</title>
    <meta name="description" content="Generate intelligent quizzes from any text. Powered by RAG and LLMs.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <main class="container glass-panel">
        <header>
            <h1 id="app-title">✨ LearnRAG</h1>
            <p class="subtitle">Turn any text into an interactive learning experience</p>
        </header>

        <!-- Section 1: Ingestion -->
        <section id="ingest-section" class="active-section section">
            <h2>1. Provide Knowledge Base</h2>
            <textarea id="knowledge-input" placeholder="Paste your text here (e.g., article, notes) to generate a quiz..."></textarea>
            <button id="generate-btn" class="primary-btn">Generate Quiz</button>
            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing context and generating questions...</p>
            </div>
        </section>

        <!-- Section 2: Quiz -->
        <section id="quiz-section" class="section hidden">
            <h2>2. Take the Quiz</h2>
            <div id="quiz-container"></div>
            <button id="submit-quiz-btn" class="primary-btn">Submit Answers</button>
        </section>

        <!-- Section 3: Results -->
        <section id="results-section" class="section hidden">
            <h2>3. Results</h2>
            <div id="score-container"></div>
            <div id="explanations-container"></div>
            <button id="reset-btn" class="secondary-btn">Start Over</button>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
